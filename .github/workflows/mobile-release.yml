name: Build mobile test release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0-test.1"
        required: true
        default: "v0.1.0-test.1"

permissions:
  contents: write

jobs:
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Collect APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/*.apk "artifacts/VDNet-${{ github.event.inputs.tag }}.apk"

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "VDNet ${{ github.event.inputs.tag }}"
          body: |
            VDNet Android test APK.

            iOS IPA requires Apple signing secrets. See docs/mobile-release.md.
          files: artifacts/*.apk

  ios-ipa:
    name: iOS IPA
    runs-on: macos-15
    steps:
      - name: Check signing secrets
        id: signing
        shell: bash
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.EXPORT_OPTIONS_PLIST_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -n "$IOS_CERTIFICATE_BASE64" && -n "$IOS_CERTIFICATE_PASSWORD" && -n "$IOS_PROVISION_PROFILE_BASE64" && -n "$EXPORT_OPTIONS_PLIST_BASE64" && -n "$KEYCHAIN_PASSWORD" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Apple signing secrets are not configured. IPA build will be skipped."
          fi

      - name: Checkout
        if: steps.signing.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.signing.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.signing.outputs.ready == 'true'
        run: npm ci

      - name: Generate iOS project
        if: steps.signing.outputs.ready == 'true'
        run: npx expo prebuild --platform ios --clean --non-interactive

      - name: Install Apple signing files
        if: steps.signing.outputs.ready == 'true'
        shell: bash
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.EXPORT_OPTIONS_PLIST_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          EXPORT_OPTIONS_PATH="$RUNNER_TEMP/ExportOptions.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          echo "$EXPORT_OPTIONS_PLIST_BASE64" | base64 --decode > "$EXPORT_OPTIONS_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"
          echo "EXPORT_OPTIONS_PATH=$EXPORT_OPTIONS_PATH" >> "$GITHUB_ENV"

      - name: Build IPA
        if: steps.signing.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          WORKSPACE="$(find ios -name '*.xcworkspace' | head -n 1)"
          SCHEME="$(basename "$WORKSPACE" .xcworkspace)"
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -archivePath "$RUNNER_TEMP/VDNet.xcarchive" archive
          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/VDNet.xcarchive" -exportPath "$RUNNER_TEMP/ios-export" -exportOptionsPlist "$EXPORT_OPTIONS_PATH"
          mkdir -p artifacts
          cp "$RUNNER_TEMP"/ios-export/*.ipa "artifacts/VDNet-${{ github.event.inputs.tag }}.ipa"

      - name: Publish IPA to GitHub Release
        if: steps.signing.outputs.ready == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "VDNet ${{ github.event.inputs.tag }}"
          files: artifacts/*.ipa
